<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STAN | Digital Architect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --neon: #00d2ff;
            --gold: #d4af37;
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; }

        /* Premium Logo */
        .logo { 
            font-size: 3rem; font-weight: 900; letter-spacing: -2px;
            background: linear-gradient(to right, #fff, var(--gold));
            -webkit-background-clip: text; color: transparent;
            filter: drop-shadow(0 0 10px rgba(212,175,55,0.3));
        }

        /* Glassmorphism Cards */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 2.5rem;
            border-radius: 20px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .glass-card:hover {
            border-color: var(--neon);
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.2);
            transform: translateY(-10px);
        }

        /* Icon Grid */
        .icon-grid { display: flex; gap: 2rem; justify-content: center; margin-top: 2rem; }
        .icon-link { 
            font-size: 2rem; color: var(--text); 
            transition: 0.3s; padding: 1rem; border-radius: 50%;
            background: var(--glass);
        }
        .icon-link:hover { color: var(--neon); transform: scale(1.2); }

        /* Typography */
        h1 { font-size: 4rem; line-height: 1; margin-bottom: 1rem; }
        .hero-text { color: var(--neon); font-size: 1.5rem; margin-bottom: 2rem; }

        /* Contact Icon Grid */
        .contact-grid { display: flex; gap: 3rem; justify-content: center; margin-top: 3rem; }
        .contact-item { text-align: center; }
        .contact-item i { font-size: 2.5rem; margin-bottom: 1rem; display: block; color: var(--gold); }

        /* Marquee */
        .marquee { overflow: hidden; white-space: nowrap; padding: 2rem 0; border-top: 1px solid #333; border-bottom: 1px solid #333; }
        .marquee-inner { display: inline-block; animation: scroll 20s linear infinite; font-size: 1.5rem; font-weight: 800; color: #444; }

        @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    </style>
</head>
<body>

    <header class="container" style="padding-top: 2rem; display: flex; justify-content: space-between; align-items: center;">
        <div class="logo">STAN</div>
        <nav>
            <div class="icon-grid">
                <a href="https://www.linkedin.com/in/stanbanilao" class="icon-link"><i class="fab fa-linkedin-in"></i></a>
                <a href="https://www.tiktok.com/@stanmcfast" class="icon-link"><i class="fab fa-tiktok"></i></a>
            </div>
        </nav>
    </header>

    <main class="container">
        <section style="padding: 100px 0;">
            <h1>AUTOMATION & OPERATIONS<br><span style="color:var(--gold)">ARCHITECT</span></h1>
            <div class="hero-text" id="typewriter"></div>
            <p style="max-width: 600px; font-size: 1.2rem; color: #aaa;">Bridging AI integration with enterprise-grade operational infrastructure.</p>
        </section>

        <section class="marquee">
            <div class="marquee-inner">
                POWER AUTOMATE • MAKE.COM • SHAREPOINT • AI AUTOMATION • PYTHON • GOOGLE APPS SCRIPT • WHATSAPP API • SQL • PROMPT ENGINEERING
            </div>
        </section>

        <section style="padding: 100px 0;">
            <h2 style="text-align: center; margin-bottom: 3rem;">DIRECT ARCHITECT ACCESS</h2>
            <div class="contact-grid">
                <a href="tel:0812795215" class="contact-item"><i class="fas fa-phone"></i><span>Voice</span></a>
                <a href="https://wa.me/27812795215" class="contact-item"><i class="fab fa-whatsapp"></i><span>Personal</span></a>
                <a href="https://wa.me/27826836364" class="contact-item"><i class="fas fa-briefcase"></i><span>Business</span></a>
                <a href="mailto:stan@thynkverse.co.za" class="contact-item"><i class="fas fa-envelope"></i><span>Email</span></a>
            </div>
        </section>
    </main>

    <script>
        const phrases = ['Automation Specialist', 'AI Integration Expert', 'App Developer', 'Data Operations Lead'];
        let i = 0, j = 0;
        function type() {
            document.getElementById('typewriter').innerText = phrases[i].substring(0, j);
            j < phrases[i].length ? j++ : (j = 0, i = (i + 1) % phrases.length);
            setTimeout(type, 150);
        }
        type();
    </script>
</body>
</html>
